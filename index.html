<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FeedWeaver - RSS Widget Generator</title>
  
  <!-- Load Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Load FontAwesome for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Load React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Load Babel to translate JSX in the browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    const MOCK_DATA = [
      { id: '1', title: 'The Future of AI in Web Development', link: '#', description: 'Discover how artificial intelligence is shaping the way we build and design websites in 2026 and beyond.', image: 'https://images.unsplash.com/photo-1677442136019-21780ecad995?auto=format&fit=crop&q=80&w=400&h=250', video: '' },
      { id: '2', title: '10 Essential Tailwind CSS Patterns', link: '#', description: 'A comprehensive guide to reusable utility-class patterns that will speed up your workflow and reduce CSS bloat.', image: 'https://images.unsplash.com/photo-1587620962725-abab7fe55159?auto=format&fit=crop&q=80&w=400&h=250', video: '' },
      { id: '3', title: 'Next-Generation JavaScript Features', link: '#', description: 'An overview of the latest ECMAScript proposals and how they can simplify your everyday coding tasks.', image: 'https://images.unsplash.com/photo-1555066931-4365d14bab8c?auto=format&fit=crop&q=80&w=400&h=250', video: '' },
    ];

    function App() {
      const [isEmbedMode, setIsEmbedMode] = useState(false);
      const [url, setUrl] = useState('');
      const [isGenerating, setIsGenerating] = useState(false);
      const [feedItems, setFeedItems] = useState([]);
      const [errorMsg, setErrorMsg] = useState('');
      const [infoMsg, setInfoMsg] = useState('');
      const [copied, setCopied] = useState(false);
      
      const [carouselIndex, setCarouselIndex] = useState(0);
      const [lightbox, setLightbox] = useState(null); // Lightbox State

      const [config, setConfig] = useState({
        layout: 'list',
        theme: 'light',
        accentColor: '#3b82f6',
        showImages: true,
        showDescription: true,
        maxItems: 5,
        tickerSpeed: 50,
        tickerCharLimit: 80,
        removeText: '', 
        refreshRate: 60, 
        carouselMode: false, 
      });

      // =====================================================================
      // IMPORTANT: Replace this URL with your actual Vercel API URL!
      // =====================================================================
      const myBackendUrl = 'https://YOUR_VERCEL_PROJECT_URL.vercel.app/api/fetch'; 

      const fetchFeedData = useCallback(async (targetUrl) => {
        setIsGenerating(true);
        setErrorMsg('');
        
        try {
          let fetchUrl = targetUrl.trim();
          
          try {
            const urlObj = new URL(fetchUrl);
            if (urlObj.hostname === 't.me' || urlObj.hostname === 'www.t.me') {
              const parts = urlObj.pathname.split('/').filter(Boolean);
              if (parts.length === 1 && parts[0] !== 's') {
                urlObj.pathname = '/s/' + parts[0];
                fetchUrl = urlObj.toString();
              }
            }
          } catch(e) {
             console.warn("URL parsing issue:", e);
          }

          let htmlString = '';
          try {
            const response = await fetch(`${myBackendUrl}?url=${encodeURIComponent(fetchUrl)}`);
            if (!response.ok) throw new Error('Vercel backend failed');
            htmlString = await response.text();
          } catch (backendErr) {
            console.warn('Backend failed, falling back to proxy waterfall...', backendErr);
            try {
              const res1 = await fetch(`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(fetchUrl)}`);
              if (!res1.ok) throw new Error('CodeTabs proxy blocked the request');
              htmlString = await res1.text();
            } catch (err1) {
              console.warn('CodeTabs failed, trying AllOrigins...', err1);
              const resFallback = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(fetchUrl)}`);
              if (!resFallback.ok) throw new Error('All free proxies failed or rate-limited');
              const data = await resFallback.json();
              htmlString = data.contents;
            }
          }

          if (!htmlString || !htmlString.includes('<html')) throw new Error("Could not fetch valid HTML from the target URL.");

          const parser = new DOMParser();
          const doc = parser.parseFromString(htmlString, 'text/html');
          const baseUrl = new URL(fetchUrl).origin;
          let items = [];
          
          if (fetchUrl.includes('t.me/s/')) {
            const messages = doc.querySelectorAll('.tgme_widget_message');
            if (messages.length === 0) throw new Error("No Telegram messages found. Channel may be private or proxy was blocked.");

            messages.forEach((msg) => {
              const textEl = msg.querySelector('.tgme_widget_message_text');
              const dateLink = msg.querySelector('.tgme_widget_message_date');

              if (textEl && dateLink) {
                const description = textEl.innerText.trim();
                let title = description.replace(/\n/g, ' ').substring(0, 250);
                if (description.length > 250) title += '...';
                if (!title) title = 'Telegram Update';

                let link = dateLink.getAttribute('href');
                if (link && !link.startsWith('http')) link = new URL(link, baseUrl).href;

                let image = '';
                let video = '';
                
                const videoEl = msg.querySelector('video');
                if (videoEl && videoEl.getAttribute('src')) {
                    video = videoEl.getAttribute('src');
                    if (video && !video.startsWith('http')) video = new URL(video, baseUrl).href;
                }

                const photoWrap = msg.querySelector('.tgme_widget_message_photo_wrap');
                if (photoWrap) {
                  const style = photoWrap.getAttribute('style');
                  const match = style && style.match(/background-image:url\('([^']+)'\)/);
                  if (match) image = match[1];
                } else {
                   const imgEl = msg.querySelector('.tgme_widget_message_photo img');
                   if (imgEl && imgEl.getAttribute('src')) image = imgEl.getAttribute('src');
                }
                
                items.push({ id: Math.random().toString(), title, link, description, image, video });
              }
            });
            items.reverse(); 
          } else {
            const headings = doc.querySelectorAll('h1, h2, h3, h4');
            headings.forEach((heading) => {
              const linkEl = heading.querySelector('a') || (heading.tagName === 'A' ? heading : null);
              if (linkEl && linkEl.innerText.trim().length > 15) {
                const title = linkEl.innerText.trim();
                let link = linkEl.getAttribute('href');
                if (link && !link.startsWith('http')) link = new URL(link, baseUrl).href;
                
                let description = '';
                let sibling = heading.nextElementSibling;
                if (sibling && sibling.tagName === 'P') description = sibling.innerText.trim().substring(0, 160) + '...';

                let image = '';
                const parent = heading.parentElement;
                if (parent) {
                   const imgEl = parent.querySelector('img');
                   if (imgEl && imgEl.getAttribute('src')) {
                      let src = imgEl.getAttribute('src');
                      if (!src.startsWith('http') && !src.startsWith('data:')) src = new URL(src, baseUrl).href;
                      image = src;
                   }
                }
                items.push({ id: Math.random().toString(), title, link, description, image, video: '' });
              }
            });
          }
          
          const uniqueItems = Array.from(new Map(items.map(item => [item.link, item])).values());
          if (uniqueItems.length >= 2) {
            setFeedItems(uniqueItems);
            setInfoMsg(`Successfully extracted ${uniqueItems.length} items.`);
          } else if (uniqueItems.length === 1) {
            setFeedItems(uniqueItems);
            setInfoMsg(`Successfully extracted 1 item.`);
          } else {
            throw new Error("Could not automatically identify feed items.");
          }
        } catch (err) {
          console.error("Scraping error:", err);
          setFeedItems(MOCK_DATA);
          setErrorMsg(`Could not parse securely (${err.message}). Showing demo data instead.`);
        } finally {
          setIsGenerating(false);
          setCarouselIndex(0); 
        }
      }, [myBackendUrl]);

      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        if (params.get('embed') === 'true') {
          setIsEmbedMode(true);
          setConfig({
            layout: params.get('layout') || 'list',
            theme: params.get('theme') || 'light',
            accentColor: params.get('color') || '#3b82f6',
            showImages: params.get('imgs') !== 'false',
            showDescription: params.get('desc') !== 'false',
            maxItems: parseInt(params.get('limit')) || 5,
            tickerSpeed: params.get('speed') !== null ? parseInt(params.get('speed')) : 50,
            tickerCharLimit: parseInt(params.get('chars')) || 80,
            removeText: params.get('remove') || '', 
            refreshRate: parseInt(params.get('refresh')) || 60,
            carouselMode: params.get('carousel') === 'true',
          });

          const targetUrl = params.get('url');
          if (targetUrl && targetUrl !== 'demo') {
            setUrl(targetUrl); 
            fetchFeedData(targetUrl);
          } else {
            setFeedItems(MOCK_DATA);
          }
        }
      }, [fetchFeedData]);

      useEffect(() => {
        if (!isEmbedMode || !url || url === 'demo' || config.refreshRate < 10) return;
        const intervalId = setInterval(() => {
          fetchFeedData(url);
        }, config.refreshRate * 1000); 
        return () => clearInterval(intervalId);
      }, [isEmbedMode, url, config.refreshRate, fetchFeedData]);

      const handleGenerate = (e) => {
        e.preventDefault();
        if (url) fetchFeedData(url);
      };

      const handleCopyCode = () => {
        const baseUrl = window.location.href.split('?')[0];
        const embedCode = `
<!-- RSS Feed Widget -->
<iframe 
  src="${baseUrl}?embed=true&url=${encodeURIComponent(url || 'demo')}&layout=${config.layout}&theme=${config.theme}&color=${encodeURIComponent(config.accentColor).replace(/%/g, '%25')}&imgs=${config.showImages}&desc=${config.showDescription}&limit=${config.maxItems}&speed=${config.tickerSpeed}&chars=${config.tickerCharLimit}&remove=${encodeURIComponent(config.removeText)}&refresh=${config.refreshRate}&carousel=${config.carouselMode}" 
  width="100%" 
  height="${config.layout === 'ticker' ? '60' : '500'}" 
  frameborder="0" 
  style="border-radius: 8px; border: 1px solid ${config.theme === 'dark' ? '#374151' : '#e5e7eb'}; background-color: ${config.theme === 'dark' ? '#0f172a' : '#ffffff'};"
></iframe>
        `.trim();

        const textArea = document.createElement("textarea");
        textArea.value = embedCode;
        document.body.appendChild(textArea);
        textArea.select();
        try {
          document.execCommand('copy');
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        } catch (err) {
          console.error('Failed to copy', err);
        }
        document.body.removeChild(textArea);
      };

      const cleanText = (str) => {
        if (!str || !config.removeText) return str;
        const escapeRegExp = (string) => string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        return str.replace(new RegExp(escapeRegExp(config.removeText), 'gi'), '').trim();
      };

      const displayItems = feedItems.slice(0, config.maxItems);
      
      const safeItemCount = Math.max(1, displayItems.length);
      const activeCarouselIndex = carouselIndex % safeItemCount;

      const nextSlide = () => setCarouselIndex((prev) => displayItems.length ? (prev + 1) % displayItems.length : 0);
      const prevSlide = () => setCarouselIndex((prev) => displayItems.length ? (prev - 1 + displayItems.length) % displayItems.length : 0);

      const durationMultiplier = (safeItemCount * config.tickerCharLimit) / 400;
      const tickerDuration = (110 - config.tickerSpeed) * durationMultiplier;

      const getGradientStyle = () => {
         return { background: `linear-gradient(to bottom right, ${config.theme === 'dark' ? '#1e293b' : '#f1f5f9'}, ${config.accentColor})` };
      }

      // Common Lightbox Component to render over everything
      const renderLightbox = () => {
        if (!lightbox) return null;
        return (
          <div className="fixed inset-0 z-[9999] flex items-center justify-center bg-black/90 p-4 transition-opacity" onClick={() => setLightbox(null)}>
            <button className="absolute top-4 right-4 text-white text-4xl hover:text-gray-300 z-[10000]" onClick={() => setLightbox(null)}>&times;</button>
            <div className="max-w-5xl w-full max-h-[90vh] flex items-center justify-center relative" onClick={(e) => e.stopPropagation()}>
              {lightbox.type === 'video' ? (
                <video src={lightbox.url} controls autoPlay className="max-w-full max-h-[90vh] object-contain rounded-lg shadow-2xl" />
              ) : (
                <img src={lightbox.url} className="max-w-full max-h-[90vh] object-contain rounded-lg shadow-2xl" />
              )}
            </div>
          </div>
        );
      };

      if (isEmbedMode) {
        return (
          <div className={`w-full min-h-screen overflow-hidden ${config.theme === 'dark' ? 'bg-slate-900 text-slate-100' : 'bg-white text-slate-800'}`}>
            <style>{`
              body { background-color: ${config.theme === 'dark' ? '#0f172a' : '#ffffff'}; margin: 0; }
              @keyframes marquee { 0% { transform: translateX(0%); } 100% { transform: translateX(-100%); } }
              .animate-marquee {
                animation: marquee ${tickerDuration}s linear infinite;
                ${config.tickerSpeed === 0 ? 'animation-play-state: paused !important;' : ''}
              }
              .pause-on-hover:hover .animate-marquee { animation-play-state: paused; }
              .embed-scroll::-webkit-scrollbar { width: 6px; }
              .embed-scroll::-webkit-scrollbar-track { background: transparent; }
              .embed-scroll::-webkit-scrollbar-thumb { background-color: rgba(156, 163, 175, 0.5); border-radius: 20px; }
            `}</style>

            <div className={`w-full h-screen ${config.layout !== 'ticker' ? 'embed-scroll overflow-y-auto p-4' : 'flex items-center'}`}>
              
              {config.layout === 'list' && (
                <div className="relative w-full group/carousel">
                  <div className="space-y-4 pb-2">
                    {displayItems.map((item, idx) => {
                      if (config.carouselMode && idx !== activeCarouselIndex) return null;
                      return (
                        <div key={idx} className={`group flex flex-col sm:flex-row gap-4 p-4 rounded-xl border transition-all duration-200 hover:shadow-md ${config.theme === 'dark' ? 'border-slate-800 hover:border-slate-700 bg-slate-800/50' : 'border-gray-100 hover:border-gray-200 bg-gray-50/50 hover:bg-white'}`}>
                          
                          {config.showImages && (item.video || item.image) && (
                            <div className="shrink-0 w-full sm:w-32 h-40 sm:h-24 rounded-lg overflow-hidden bg-gray-200 dark:bg-slate-700 relative">
                              {item.video ? (
                                <div className="w-full h-full relative cursor-pointer group/media overflow-hidden" onClick={(e) => { e.preventDefault(); e.stopPropagation(); setLightbox({type: 'video', url: item.video}); }}>
                                  <video src={item.video} autoPlay loop muted playsInline className="w-full h-full object-cover pointer-events-none group-hover:scale-105 transition-transform duration-500" />
                                  <div className="absolute inset-0 flex items-center justify-center bg-black/10 group-hover/media:bg-black/30 transition-colors"><i className="fa-solid fa-play text-white text-2xl drop-shadow opacity-80 group-hover/media:opacity-100 group-hover/media:scale-110 transition-all"></i></div>
                                </div>
                              ) : (
                                <div className="w-full h-full relative cursor-pointer group/media overflow-hidden" onClick={(e) => { e.preventDefault(); e.stopPropagation(); setLightbox({type: 'image', url: item.image}); }}>
                                  <img src={item.image} alt={item.title} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" onError={(e) => e.target.style.display = 'none'} />
                                  <div className="absolute inset-0 flex items-center justify-center bg-black/0 group-hover/media:bg-black/20 transition-colors"><i className="fa-solid fa-expand text-white text-2xl drop-shadow opacity-0 group-hover/media:opacity-100 group-hover/media:scale-110 transition-all"></i></div>
                                </div>
                              )}
                            </div>
                          )}

                          <div className="flex flex-col justify-center flex-1 min-w-0">
                            <a href={item.link} target="_blank" rel="noopener noreferrer" className="block">
                              <h3 className="font-semibold text-base leading-tight mb-2 truncate group-hover:underline decoration-2 underline-offset-2" style={{ textDecorationColor: config.accentColor }}>
                                {cleanText(item.title)}
                              </h3>
                              {config.showDescription && item.description && (
                                <p className={`text-sm line-clamp-2 ${config.theme === 'dark' ? 'text-slate-400' : 'text-gray-500'}`}>
                                  {cleanText(item.description)}
                                </p>
                              )}
                            </a>
                          </div>
                        </div>
                      );
                    })}
                  </div>

                  {config.carouselMode && displayItems.length > 1 && (
                    <div className="flex justify-between items-center mt-2 px-2 pb-4 opacity-100 sm:opacity-0 sm:group-hover/carousel:opacity-100 transition-opacity duration-300">
                      <button onClick={prevSlide} className={`px-3 py-1.5 rounded-full flex items-center gap-2 transition-colors ${config.theme === 'dark' ? 'bg-slate-800 hover:bg-slate-700 text-white' : 'bg-white hover:bg-gray-100 border border-gray-200 shadow-sm text-gray-700'}`}>
                        <i className="fa-solid fa-chevron-left text-[10px]"></i> Prev
                      </button>
                      <span className={`text-xs font-medium ${config.theme === 'dark' ? 'text-slate-400' : 'text-gray-500'}`}>
                        {activeCarouselIndex + 1} / {displayItems.length}
                      </span>
                      <button onClick={nextSlide} className={`px-3 py-1.5 rounded-full flex items-center gap-2 transition-colors ${config.theme === 'dark' ? 'bg-slate-800 hover:bg-slate-700 text-white' : 'bg-white hover:bg-gray-100 border border-gray-200 shadow-sm text-gray-700'}`}>
                        Next <i className="fa-solid fa-chevron-right text-[10px]"></i>
                      </button>
                    </div>
                  )}
                </div>
              )}

              {config.layout === 'grid' && (
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 pb-4 w-full">
                  {displayItems.map((item, idx) => (
                    <div key={idx} className={`group flex flex-col h-full rounded-xl border overflow-hidden transition-all duration-200 hover:-translate-y-1 hover:shadow-md ${config.theme === 'dark' ? 'border-slate-800 hover:border-slate-700 bg-slate-800/50' : 'border-gray-100 hover:border-gray-200 bg-white'}`}>
                      {config.showImages && (item.video || item.image) ? (
                        <div className="w-full h-32 overflow-hidden bg-gray-200 dark:bg-slate-700 border-b border-inherit relative">
                          {item.video ? (
                            <div className="w-full h-full relative cursor-pointer group/media overflow-hidden" onClick={(e) => { e.preventDefault(); e.stopPropagation(); setLightbox({type: 'video', url: item.video}); }}>
                              <video src={item.video} autoPlay loop muted playsInline className="w-full h-full object-cover pointer-events-none group-hover:scale-105 transition-transform duration-500" />
                              <div className="absolute inset-0 flex items-center justify-center bg-black/10 group-hover/media:bg-black/30 transition-colors"><i className="fa-solid fa-play text-white text-3xl drop-shadow opacity-80 group-hover/media:opacity-100 group-hover/media:scale-110 transition-all"></i></div>
                            </div>
                          ) : (
                            <div className="w-full h-full relative cursor-pointer group/media overflow-hidden" onClick={(e) => { e.preventDefault(); e.stopPropagation(); setLightbox({type: 'image', url: item.image}); }}>
                              <img src={item.image} alt={item.title} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" onError={(e) => e.target.style.display = 'none'} />
                              <div className="absolute inset-0 flex items-center justify-center bg-black/0 group-hover/media:bg-black/20 transition-colors"><i className="fa-solid fa-expand text-white text-3xl drop-shadow opacity-0 group-hover/media:opacity-100 group-hover/media:scale-110 transition-all"></i></div>
                            </div>
                          )}
                        </div>
                      ) : config.showImages && !item.image && !item.video ? (
                         <div className="w-full h-16 opacity-50 border-b border-inherit" style={getGradientStyle()}></div>
                      ) : null}
                      <div className="p-3 flex flex-col flex-1">
                        <a href={item.link} target="_blank" rel="noopener noreferrer" className="block h-full">
                          <h3 className="font-bold text-sm leading-snug mb-1 group-hover:underline decoration-2 underline-offset-2 line-clamp-2" style={{ textDecorationColor: config.accentColor }}>
                            {cleanText(item.title)}
                          </h3>
                          {config.showDescription && item.description && (
                            <p className={`text-xs mt-auto line-clamp-3 ${config.theme === 'dark' ? 'text-slate-400' : 'text-gray-500'}`}>
                              {cleanText(item.description)}
                            </p>
                          )}
                        </a>
                      </div>
                    </div>
                  ))}
                </div>
              )}

              {config.layout === 'ticker' && (
                <div className="w-full h-full flex items-center overflow-hidden pause-on-hover relative">
                  <div className={`absolute left-0 top-0 bottom-0 w-8 z-10 bg-gradient-to-r ${config.theme === 'dark' ? 'from-slate-900 to-transparent' : 'from-white to-transparent'}`}></div>
                  
                  <div className="flex animate-marquee shrink-0 items-center">
                    {displayItems.concat(displayItems).map((item, idx) => {
                      const cTitle = cleanText(item.title);
                      const tTitle = cTitle.length > config.tickerCharLimit ? cTitle.substring(0, config.tickerCharLimit) + '...' : cTitle;
                      return (
                        <a key={`t1-${idx}`} href={item.link} target="_blank" rel="noopener noreferrer" className="inline-flex items-center px-6 whitespace-nowrap group">
                          <span className="mr-3 text-xl leading-none shrink-0" style={{ color: config.accentColor }}>&bull;</span>
                          <span className="font-medium text-sm hover:underline decoration-2 underline-offset-4" style={{ textDecorationColor: config.accentColor }}>{tTitle}</span>
                        </a>
                      );
                    })}
                  </div>
                  <div className="flex animate-marquee shrink-0 items-center" aria-hidden="true">
                    {displayItems.concat(displayItems).map((item, idx) => {
                      const cTitle = cleanText(item.title);
                      const tTitle = cTitle.length > config.tickerCharLimit ? cTitle.substring(0, config.tickerCharLimit) + '...' : cTitle;
                      return (
                        <a key={`t2-${idx}`} href={item.link} target="_blank" rel="noopener noreferrer" className="inline-flex items-center px-6 whitespace-nowrap group">
                          <span className="mr-3 text-xl leading-none shrink-0" style={{ color: config.accentColor }}>&bull;</span>
                          <span className="font-medium text-sm hover:underline decoration-2 underline-offset-4" style={{ textDecorationColor: config.accentColor }}>{tTitle}</span>
                        </a>
                      );
                    })}
                  </div>

                  <div className={`absolute right-0 top-0 bottom-0 w-8 z-10 bg-gradient-to-l ${config.theme === 'dark' ? 'from-slate-900 to-transparent' : 'from-white to-transparent'}`}></div>
                </div>
              )}
            </div>
            
            {renderLightbox()}
          </div>
        );
      }

      // =====================================================================
      // RENDER: GENERATOR UI 
      // =====================================================================
      return (
        <div className="min-h-screen bg-gray-50 text-slate-800 font-sans">
          <style>{`
            @keyframes marquee { 0% { transform: translateX(0%); } 100% { transform: translateX(-100%); } }
            .animate-marquee { animation: marquee ${tickerDuration}s linear infinite; ${config.tickerSpeed === 0 ? 'animation-play-state: paused !important;' : ''} }
            .pause-on-hover:hover .animate-marquee { animation-play-state: paused; }
            .preview-scroll::-webkit-scrollbar { width: 6px; }
            .preview-scroll::-webkit-scrollbar-track { background: transparent; }
            .preview-scroll::-webkit-scrollbar-thumb { background-color: rgba(156, 163, 175, 0.5); border-radius: 20px; }
          `}</style>

          <header className="bg-white border-b border-gray-200 sticky top-0 z-10">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
              <div className="flex items-center gap-2">
                <div className="bg-blue-600 p-2 rounded-lg text-white">
                  <i className="fa-solid fa-rss text-lg"></i>
                </div>
                <h1 className="text-xl font-bold tracking-tight text-gray-900">FeedWeaver</h1>
              </div>
              <div className="text-sm text-gray-500 font-medium">URL to Embed Widget</div>
            </div>
          </header>

                        )}
                      </div>
                    </div>
                  )}
                </div>
              </div>
              
              {/* Lightbox Rendering in UI Mode */}
              {renderLightbox()}

            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
