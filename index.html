<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FeedWeaver - RSS Widget Generator</title>
  
  <!-- Load Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Load FontAwesome for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Load Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Load React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Load Babel to translate JSX in the browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    const MOCK_DATA = [
      { id: '1', title: 'The Future of AI in Web Development', link: '#', description: 'Discover how artificial intelligence is shaping the way we build and design websites in 2026 and beyond.', image: 'https://images.unsplash.com/photo-1677442136019-21780ecad995?auto=format&fit=crop&q=80&w=400&h=250', video: '', isVideo: false, embedUrl: '', time: new Date(Date.now() - 5 * 60000).toISOString(), source: 'TechInsider' },
      { id: '2', title: '10 Essential Tailwind CSS Patterns', link: '#', description: 'A comprehensive guide to reusable utility-class patterns that will speed up your workflow and reduce CSS bloat.', image: 'https://images.unsplash.com/photo-1587620962725-abab7fe55159?auto=format&fit=crop&q=80&w=400&h=250', video: '', isVideo: false, embedUrl: '', time: new Date(Date.now() - 120 * 60000).toISOString(), source: 'DesignWeekly' },
      { id: '3', title: 'Next-Generation JavaScript Features', link: '#', description: 'An overview of the latest ECMAScript proposals and how they can simplify your everyday coding tasks.', image: 'https://images.unsplash.com/photo-1555066931-4365d14bab8c?auto=format&fit=crop&q=80&w=400&h=250', video: '', isVideo: false, embedUrl: '', time: new Date(Date.now() - 1440 * 60000).toISOString(), source: 'CodeDaily' },
    ];

    // =====================================================================
    // Helper: Force Autoplay Video Component to bypass strict browser policies
    // =====================================================================
    const AutoPlayVideo = ({ src, poster, className }) => {
      const videoRef = useRef(null);
      
      useEffect(() => {
        const video = videoRef.current;
        if (!video) return;

        // Force muted attributes directly onto the DOM node
        video.muted = true;
        video.defaultMuted = true;
        video.setAttribute('playsinline', '');
        video.setAttribute('muted', '');

        const tryPlay = () => {
          const playPromise = video.play();
          if (playPromise !== undefined) {
            playPromise.catch(error => {
              console.log("Autoplay prevented:", error);
            });
          }
        };

        // Try playing immediately
        tryPlay();

        // Also try playing the exact moment the video data is ready
        video.addEventListener('canplay', tryPlay);
        video.addEventListener('loadedmetadata', tryPlay);

        return () => {
          video.removeEventListener('canplay', tryPlay);
          video.removeEventListener('loadedmetadata', tryPlay);
        };
      }, [src]);

      return (
        <video 
          ref={videoRef}
          src={src} 
          poster={poster}
          referrerPolicy="no-referrer" 
          autoPlay 
          loop 
          muted 
          playsInline 
          className={className} 
        />
      );
    };

    // =====================================================================
    // Dynamic Endpoint Resolution (Prevents "Failed to fetch" errors)
    // =====================================================================
    const isLocalFile = typeof window !== 'undefined' && window.location.protocol === 'file:';
    const hostUrl = isLocalFile ? 'https://rss-chi-five.vercel.app' : ''; 
    const myBackendUrl = `${hostUrl}/api/fetch`; 
    const myTtsUrl = `${hostUrl}/api/tts`;

    function App() {
      const [isEmbedMode, setIsEmbedMode] = useState(false);
      
      // Data Source States
      const [sourceMode, setSourceMode] = useState('urls'); // 'urls' or 'topic'
      const [url, setUrl] = useState('');
      const [topicQuery, setTopicQuery] = useState('');
      
      const [isGenerating, setIsGenerating] = useState(false);
      const [isPreviewing, setIsPreviewing] = useState(false);
      const [feedItems, setFeedItems] = useState([]);
      const [errorMsg, setErrorMsg] = useState('');
      const [infoMsg, setInfoMsg] = useState('');
      const [copied, setCopied] = useState(false);
      
      const [carouselIndex, setCarouselIndex] = useState(0);
      const [lightbox, setLightbox] = useState(null);

      // Export Widget Dimensions
      const [exportWidth, setExportWidth] = useState('100%');
      const [exportHeight, setExportHeight] = useState('500px');

      // TTS Mute State & Queue System
      const [isGlobalMuted, setIsGlobalMuted] = useState(false);
      const isGlobalMutedRef = useRef(false);
      
      const audioQueueRef = useRef([]); // The queue holds pending audio texts
      const isSpeakingRef = useRef(false); // Lock to prevent overlapping audio
      const currentAudioRef = useRef(null);
      const recentlyReadRef = useRef(new Set()); // Memory bank to prevent reading exact duplicates
      
      // ICYMI / Interruption Tracking Refs
      const currentlyPlayingTypeRef = useRef(null); // 'live' | 'icymi' | null
      const lastSpokenTimeRef = useRef(Date.now()); // Tracks dead air time

      const [config, setConfig] = useState({
        layout: 'list',
        theme: 'light',
        bgColor: '#ffffff',
        cardBgColor: '#f8fafc',
        fontFamily: 'sans',
        accentColor: '#3b82f6',
        showImages: true,
        showDescription: true,
        maxItems: 5,
        tickerSpeed: 50,
        tickerCharLimit: 80,
        removeText: '', 
        excludeKeywords: '', // Spam filter keywords
        whitelistSources: '', // NEW: Only show news from these sources
        fallbackImage: '', // Fallback Image for text-only posts
        refreshRate: 60, 
        carouselMode: false, 
        autoRead: false,
        enableIcymi: false, // ICYMI Auto-Loop
        icymiTime: 3,       // Minutes of silence before ICYMI kicks in
        openAIVoice: 'alloy', 
        seamless: false, 
      });

      const configRef = useRef(config);
      useEffect(() => {
        configRef.current = config;
      }, [config]);

      useEffect(() => {
        if (config.layout === 'ticker') setExportHeight('60px');
        else if (exportHeight === '60px') setExportHeight('500px');
      }, [config.layout]);

      const toggleMute = useCallback((e) => {
        if (e) {
          e.preventDefault();
          e.stopPropagation();
        }
        isGlobalMutedRef.current = !isGlobalMutedRef.current;
        setIsGlobalMuted(isGlobalMutedRef.current);
        
        // Immediately stop any currently playing audio and clear queue
        if (isGlobalMutedRef.current) {
          audioQueueRef.current = []; // Clear the queue so it doesn't resume later
          isSpeakingRef.current = false;
          currentlyPlayingTypeRef.current = null;
          
          if (currentAudioRef.current) {
            currentAudioRef.current.onended = null;
            currentAudioRef.current.pause();
            currentAudioRef.current = null;
          }
          if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
          }
          lastSpokenTimeRef.current = Date.now();
        }
      }, []);

      // =====================================================================
      // Audio Queue Processor
      // =====================================================================
      const processAudioQueue = useCallback(async () => {
        // If muted, already speaking, or queue is empty, do nothing
        if (isGlobalMutedRef.current || isSpeakingRef.current || audioQueueRef.current.length === 0) {
            if (audioQueueRef.current.length === 0 && !isSpeakingRef.current) {
                lastSpokenTimeRef.current = Date.now(); // Keep resetting while empty
            }
            return;
        }

        isSpeakingRef.current = true; // Lock the queue
        lastSpokenTimeRef.current = Date.now(); // Reset dead air timer
        const { text, forceApi, isIcymi } = audioQueueRef.current.shift(); // Get the next item
        currentlyPlayingTypeRef.current = isIcymi ? 'icymi' : 'live';
        
        const voice = configRef.current.openAIVoice || 'alloy';

        if (configRef.current.autoRead || forceApi) {
          try {
            const response = await fetch(myTtsUrl, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ text, voice })
            });

            if (!response.ok) throw new Error(`TTS API Error ${response.status}`);
            
            const blob = await response.blob();
            const audioUrl = URL.createObjectURL(blob);
            const audio = new Audio(audioUrl);
            currentAudioRef.current = audio;
            
            // Unlocks the queue when this specific audio finishes
            audio.onended = () => {
              isSpeakingRef.current = false;
              currentAudioRef.current = null;
              currentlyPlayingTypeRef.current = null;
              lastSpokenTimeRef.current = Date.now();
              processAudioQueue(); // Trigger next item in line
            };
            audio.onerror = () => {
              isSpeakingRef.current = false;
              currentAudioRef.current = null;
              currentlyPlayingTypeRef.current = null;
              lastSpokenTimeRef.current = Date.now();
              processAudioQueue(); 
            };

            await audio.play().catch(e => {
              console.warn("Autoplay blocked. User interaction required.", e);
              isSpeakingRef.current = false;
              currentAudioRef.current = null;
              currentlyPlayingTypeRef.current = null;
              processAudioQueue(); 
            });
            return;
          } catch (error) {
            console.error('Secure TTS Error. Falling back to local voice:', error);
          }
        }

        // Native Browser Fallback (if OpenAI fails or isn't used)
        if ('speechSynthesis' in window) {
          const utterance = new SpeechSynthesisUtterance(text);
          utterance.rate = 1.0;
          const voices = window.speechSynthesis.getVoices();
          const preferredVoice = voices.find(v => v.name.includes('Google') || v.name.includes('Samantha') || v.lang === 'en-US' || v.lang === 'en-GB');
          if (preferredVoice) utterance.voice = preferredVoice;
          
          utterance.onend = () => {
             isSpeakingRef.current = false;
             currentlyPlayingTypeRef.current = null;
             lastSpokenTimeRef.current = Date.now();
             processAudioQueue();
          };
          utterance.onerror = () => {
             isSpeakingRef.current = false;
             currentlyPlayingTypeRef.current = null;
             lastSpokenTimeRef.current = Date.now();
             processAudioQueue();
          };
          
          window.speechSynthesis.speak(utterance);
        } else {
          isSpeakingRef.current = false;
          currentlyPlayingTypeRef.current = null;
          processAudioQueue();
        }
      }, [myTtsUrl]);

      // Public API to speak text: Just pushes to queue, handles interruptions
      const speakText = useCallback((text, options = {}) => {
        const { forceApi = false, isLiveUpdate = false, isIcymi = false } = options;
        
        if (!text || (isGlobalMutedRef.current && !forceApi)) return;
        
        // Anti-Duplicate Filter for live updates
        if (!forceApi && !isIcymi) {
           if (recentlyReadRef.current.has(text)) return; 
           recentlyReadRef.current.add(text);
           if (recentlyReadRef.current.size > 50) {
               const iterator = recentlyReadRef.current.values();
               recentlyReadRef.current.delete(iterator.next().value);
           }
        }

        // PRIORITY INTERRUPTION: If a live update arrives, stop any ICYMI immediately!
        if (isLiveUpdate || forceApi) {
            // Strip ICYMI items from the pending queue
            audioQueueRef.current = audioQueueRef.current.filter(item => !item.isIcymi);
            
            // If we are CURRENTLY speaking an ICYMI, cancel it mid-sentence.
            if (currentlyPlayingTypeRef.current === 'icymi' || forceApi) {
                if (currentAudioRef.current) {
                    currentAudioRef.current.onended = null; // Prevent double trigger
                    currentAudioRef.current.pause();
                    currentAudioRef.current = null;
                }
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                }
                isSpeakingRef.current = false;
                currentlyPlayingTypeRef.current = null;
            }
        }

        audioQueueRef.current.push({ text, forceApi, isIcymi });
        processAudioQueue();
      }, [processAudioQueue]);

      const handlePreviewVoice = async (e) => {
        e.preventDefault();
        if (isPreviewing) return;
        setIsPreviewing(true);
        
        // Temporarily clear queue to prioritize the preview
        audioQueueRef.current = [];
        
        let textToRead = "This is a preview of the selected voice.";
        if (feedItems.length > 0) {
          let title = feedItems[0].title;
          let description = feedItems[0].description || '';
          
          if (config.removeText) {
             const escapeRegExp = (string) => string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
             title = title.replace(new RegExp(escapeRegExp(config.removeText), 'gi'), '').trim();
             description = description.replace(new RegExp(escapeRegExp(config.removeText), 'gi'), '').trim();
          }
          
          textToRead = "Latest Update: " + title;
          if (description && description.length > 10) {
              textToRead += ". " + description;
          }
        }
        
        speakText(textToRead, { forceApi: true });
        
        // Simple timeout to reset button state
        setTimeout(() => setIsPreviewing(false), 2000); 
      };

      // =====================================================================
      // ICYMI Auto-Loop Watcher (Checks for dead air)
      // =====================================================================
      useEffect(() => {
        if (!config.autoRead || !config.enableIcymi || feedItems.length === 0) return;

        const interval = setInterval(() => {
           // If we are currently talking or muted, push the timer back
           if (isSpeakingRef.current || isGlobalMutedRef.current || audioQueueRef.current.length > 0) {
               lastSpokenTimeRef.current = Date.now();
               return;
           }

           const timeSinceLastSpoken = Date.now() - lastSpokenTimeRef.current;
           const thresholdMs = config.icymiTime * 60 * 1000;

           if (timeSinceLastSpoken >= thresholdMs) {
               // Dead air detected! Grab a random recent story.
               const recentItems = feedItems.slice(0, Math.min(15, feedItems.length)); 
               const randomItem = recentItems[Math.floor(Math.random() * recentItems.length)];
               
               if (randomItem) {
                   let textToRead = randomItem.title;
                   let description = randomItem.description || '';
                   
                   if (config.removeText) {
                       const escapeRegExp = (string) => string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                       textToRead = textToRead.replace(new RegExp(escapeRegExp(config.removeText), 'gi'), '').trim();
                       description = description.replace(new RegExp(escapeRegExp(config.removeText), 'gi'), '').trim();
                   }
                   
                   if (description && description.length > 10) {
                       textToRead += ". " + description;
                   }
                   
                   const icymiPrefixes = [
                       "In case you missed it: ", 
                       "Recapping today's top stories: ", 
                       "Earlier today: ", 
                       "A quick recap: ",
                       "Catching you up: "
                   ];
                   const randomPrefix = icymiPrefixes[Math.floor(Math.random() * icymiPrefixes.length)];
                   
                   speakText(randomPrefix + textToRead, { isIcymi: true });
                   lastSpokenTimeRef.current = Date.now(); // Reset timer
               }
           }
        }, 10000); // Check every 10 seconds

        return () => clearInterval(interval);
      }, [config.autoRead, config.enableIcymi, config.icymiTime, config.removeText, feedItems, speakText]);


      // =====================================================================
      // Multi-Source Fetch & Scraping Engine
      // =====================================================================
      const fetchFeedData = useCallback(async (targetUrlsStr, isSilent = false) => {
        if (!isSilent) {
          setIsGenerating(true);
          setErrorMsg('');
        }
        
        try {
          // Split input string by newlines or commas into an array of URLs
          const rawUrlList = targetUrlsStr.split(/[\n,]+/).map(s => s.trim()).filter(Boolean);
          if (rawUrlList.length === 0) throw new Error("No valid URLs provided.");

          // Helper function to process a single URL
          const fetchSingleUrl = async (rawUrl) => {
            let fetchUrl = rawUrl;
            try {
              const urlObj = new URL(fetchUrl);
              if (urlObj.hostname === 't.me' || urlObj.hostname === 'www.t.me') {
                const parts = urlObj.pathname.split('/').filter(Boolean);
                if (parts.length === 1 && parts[0] !== 's') {
                  urlObj.pathname = '/s/' + parts[0];
                }
              }
              urlObj.searchParams.set('r', Date.now().toString()); // Cache Buster
              fetchUrl = urlObj.toString();
            } catch(e) {}

            let htmlString = '';
            const encodedTarget = encodeURIComponent(fetchUrl);
            
            try {
              const response = await fetch(`${myBackendUrl}?url=${encodedTarget}`, { cache: 'no-store' });
              if (!response.ok) throw new Error('Backend failed');
              htmlString = await response.text();
            } catch (backendErr) {
              const res1 = await fetch(`https://api.codetabs.com/v1/proxy?quest=${encodedTarget}`, { cache: 'no-store' });
              if (res1.ok) htmlString = await res1.text();
              else {
                const resFallback = await fetch(`https://api.allorigins.win/get?url=${encodedTarget}`, { cache: 'no-store' });
                const data = await resFallback.json();
                htmlString = data.contents;
              }
            }

            if (!htmlString) throw new Error("Empty response received");

            const parser = new DOMParser();
            let doc;
            let isXML = false;
            
            // Detect if the payload is RSS/XML
            const htmlTrimmed = htmlString.trim();
            if (htmlTrimmed.startsWith('<?xml') || htmlTrimmed.includes('<rss') || htmlTrimmed.includes('<feed')) {
                doc = parser.parseFromString(htmlString, 'text/xml');
                isXML = true;
            } else {
                doc = parser.parseFromString(htmlString, 'text/html');
            }

            const baseUrl = new URL(fetchUrl).origin;
            let items = [];
            let globalSourceName = new URL(fetchUrl).hostname.replace('www.', '');

            if (isXML) {
                // --- 1. Standard RSS / Atom XML Parser ---
                const channelTitle = doc.querySelector('channel > title, feed > title');
                if (channelTitle) globalSourceName = channelTitle.textContent.trim();
                
                const nodes = doc.querySelectorAll('item, entry');
                nodes.forEach(node => {
                    let itemSourceName = globalSourceName;
                    
                    // Attempt to extract specific source name (Common in Google News RSS)
                    const sourceEl = node.querySelector('source');
                    if (sourceEl) itemSourceName = sourceEl.textContent.trim();

                    let title = node.querySelector('title')?.textContent?.trim() || '';
                    
                    // Clean Google News Titles (Removes the trailing " - Source Name")
                    if (itemSourceName && title.endsWith(` - ${itemSourceName}`)) {
                        title = title.substring(0, title.length - (` - ${itemSourceName}`).length);
                    }

                    // Look for rich content first, fallback to standard description
                    let rawDescription = node.querySelector('encoded, content\\:encoded, description, content, summary')?.textContent?.trim() || '';
                    
                    let linkNode = node.querySelector('link');
                    let link = linkNode?.textContent?.trim() || linkNode?.getAttribute('href') || fetchUrl;
                    if (link && !link.startsWith('http')) link = new URL(link, baseUrl).href;
                    
                    let timeStr = node.querySelector('pubDate, published, updated, date, dc\\:date')?.textContent?.trim() || '';
                    
                    let image = '';
                    let video = '';
                    let isVideo = false;
                    let embedUrl = '';
                    
                    // Enclosures
                    const enclosure = node.querySelector('enclosure');
                    if (enclosure) {
                        const type = enclosure.getAttribute('type') || '';
                        const url = enclosure.getAttribute('url');
                        if (type.startsWith('video')) { video = url; isVideo = true; } 
                        else if (type.startsWith('image')) { image = url; }
                    }
                    
                    // Parse CDATA/HTML inside description for media
                    if (!image) {
                        const imgMatch = rawDescription.match(/<img[^>]+src=['"]([^'"]+)['"]/i);
                        if (imgMatch) image = imgMatch[1];
                    }
                    if (!video) {
                        const vidMatch = rawDescription.match(/<video[^>]+src=['"]([^'"]+)['"]/i) || rawDescription.match(/<source[^>]+src=['"]([^'"]+)['"]/i);
                        if (vidMatch) { video = vidMatch[1]; isVideo = true; }
                    }

                    // Strip HTML from description to get pure article text/summary
                    const tempDiv = document.createElement('div');
                    tempDiv.innerHTML = rawDescription;
                    let cleanDescription = tempDiv.textContent || tempDiv.innerText || '';
                    
                    // Clean up duplicate titles/sources often stuffed into Google News descriptions
                    if (title && cleanDescription && cleanDescription.includes(title)) {
                        cleanDescription = cleanDescription.replace(title, '').trim();
                    }
                    if (itemSourceName && cleanDescription.startsWith("- " + itemSourceName)) {
                        cleanDescription = cleanDescription.replace("- " + itemSourceName, '').trim();
                    }

                    if (title || cleanDescription) {
                        items.push({ id: Math.random().toString(), title: title || 'News Update', link, description: cleanDescription, image, video, isVideo, embedUrl, time: timeStr, source: itemSourceName });
                    }
                });
            } else if (fetchUrl.includes('t.me/s/')) {
                // --- 2. Telegram Logic (Existing) ---
                const messages = doc.querySelectorAll('.tgme_widget_message');
                messages.forEach((msg) => {
                  const textEl = msg.querySelector('.tgme_widget_message_text');
                  const dateLink = msg.querySelector('.tgme_widget_message_date');
                  
                  let itemSourceName = globalSourceName;
                  const authorEl = msg.querySelector('.tgme_widget_message_owner_name span') || msg.querySelector('.tgme_widget_message_owner_name');
                  if (authorEl) {
                      itemSourceName = authorEl.innerText.trim();
                  } else {
                      const urlParts = new URL(fetchUrl).pathname.split('/').filter(Boolean);
                      itemSourceName = urlParts[urlParts.length - 1] || 'Telegram';
                  }

                  if (textEl && dateLink) {
                    let title = textEl.innerText.trim().replace(/\n/g, ' ');
                    if (!title) title = 'Telegram Update';

                    let link = dateLink.getAttribute('href');
                    if (link && !link.startsWith('http')) link = new URL(link, baseUrl).href;

                    let timeStr = '';
                    const timeEl = dateLink.querySelector('time');
                    if (timeEl && timeEl.getAttribute('datetime')) timeStr = timeEl.getAttribute('datetime');

                    let image = ''; let video = ''; let isVideo = false; let embedUrl = '';
                    
                    let videoEl = msg.querySelector('video') || msg.querySelector('.tgme_widget_message_video_wrap video');
                    if (videoEl) {
                        let vSrc = videoEl.getAttribute('src') || videoEl.getAttribute('data-src') || (videoEl.querySelector('source') && videoEl.querySelector('source').getAttribute('src'));
                        if (vSrc) video = vSrc.startsWith('http') ? vSrc : new URL(vSrc, baseUrl).href;
                    }
                    
                    if (video) isVideo = true;
                    else if (msg.querySelector('.tgme_widget_message_video_player, .tgme_widget_message_video_wrap, .play_icon')) {
                        isVideo = true;
                        try {
                            const u = new URL(link); u.searchParams.set('embed', '1'); u.searchParams.set('autoplay', '1');
                            embedUrl = u.toString();
                        } catch(e) {}
                    }

                    const photoWrap = msg.querySelector('.tgme_widget_message_photo_wrap, .tgme_widget_message_video_thumb');
                    if (photoWrap) {
                      const match = photoWrap.getAttribute('style')?.match(/background-image:\s*url\(['"]?([^'"]+)['"]?\)/i);
                      if (match) image = match[1];
                    } 
                    if (!image) {
                       const imgEl = msg.querySelector('.tgme_widget_message_photo img');
                       if (imgEl && imgEl.getAttribute('src')) image = imgEl.getAttribute('src');
                    }
                    
                    items.push({ id: Math.random().toString(), title, link, description: '', image, video, isVideo, embedUrl, time: timeStr, source: itemSourceName });
                  }
                });
            } else if (htmlString.includes('timeline-item') && htmlString.includes('tweet-content')) {
                // --- 3. Nitter / Xcancel HTML Parser ---
                let itemSourceName = globalSourceName;
                const profileNameEl = doc.querySelector('.profile-card-fullname');
                if (profileNameEl) itemSourceName = profileNameEl.innerText.trim();

                const tweets = doc.querySelectorAll('.timeline-item:not(.show-more)');
                tweets.forEach(tweet => {
                    const contentEl = tweet.querySelector('.tweet-content');
                    if (!contentEl) return;
                    
                    let title = contentEl.innerText.trim();
                    if (!title) return;

                    let linkEl = tweet.querySelector('.tweet-link');
                    let link = linkEl ? linkEl.getAttribute('href') : fetchUrl;
                    if (link && !link.startsWith('http')) link = new URL(link, baseUrl).href;

                    let timeStr = '';
                    const dateEl = tweet.querySelector('.tweet-date a');
                    if (dateEl) timeStr = dateEl.getAttribute('title') || dateEl.innerText;

                    let image = ''; let video = ''; let isVideo = false; let embedUrl = '';

                    const imgEl = tweet.querySelector('.attachment.image img, .still-image img');
                    if (imgEl) {
                        image = imgEl.getAttribute('src');
                        if (image && !image.startsWith('http')) image = new URL(image, baseUrl).href;
                    }

                    const vidEl = tweet.querySelector('video');
                    if (vidEl) {
                        const src = vidEl.getAttribute('data-url') || vidEl.getAttribute('src');
                        const source = vidEl.querySelector('source');
                        const finalSrc = src || (source && source.getAttribute('src'));
                        if (finalSrc) {
                            video = finalSrc.startsWith('http') ? finalSrc : new URL(finalSrc, baseUrl).href;
                            isVideo = true;
                            const poster = vidEl.getAttribute('poster');
                            if (poster) image = poster.startsWith('http') ? poster : new URL(poster, baseUrl).href;
                        }
                    }

                    items.push({ id: Math.random().toString(), title, link, description: '', image, video, isVideo, embedUrl, time: timeStr, source: itemSourceName });
                });
            } else {
                // --- 4. Generic HTML Parser Fallback ---
                const headings = doc.querySelectorAll('h1, h2, h3, h4');
                headings.forEach((heading) => {
                  const linkEl = heading.querySelector('a') || (heading.tagName === 'A' ? heading : null);
                  if (linkEl && linkEl.innerText.trim().length > 15) {
                    const title = linkEl.innerText.trim();
                    let link = linkEl.getAttribute('href');
                    if (link && !link.startsWith('http')) link = new URL(link, baseUrl).href;
                    
                    let description = '';
                    let sibling = heading.nextElementSibling;
                    if (sibling && sibling.tagName === 'P') description = sibling.innerText.trim().substring(0, 160) + '...';

                    let image = ''; let video = ''; let isVideo = false; let embedUrl = '';
                    const parent = heading.parentElement;
                    if (parent) {
                       const videoEl = parent.querySelector('video');
                       if (videoEl) {
                           let vSrc = videoEl.getAttribute('src') || videoEl.getAttribute('data-src') || (videoEl.querySelector('source') && videoEl.querySelector('source').getAttribute('src'));
                           if (vSrc) video = vSrc.startsWith('http') ? vSrc : new URL(vSrc, baseUrl).href;
                       }
                       if (!video) {
                           const imgEl = parent.querySelector('img');
                           if (imgEl && imgEl.getAttribute('src')) {
                              let src = imgEl.getAttribute('src');
                              image = src.startsWith('http') || src.startsWith('data:') ? src : new URL(src, baseUrl).href;
                           }
                       }
                    }
                    if (video) isVideo = true;
                    items.push({ id: Math.random().toString(), title, link, description, image, video, isVideo, embedUrl, time: '', source: globalSourceName });
                  }
                });
            }
            return items;
          };

          // Fetch all URLs simultaneously
          const allResults = await Promise.allSettled(rawUrlList.map(u => fetchSingleUrl(u)));
          let allCombinedItems = [];
          
          allResults.forEach(result => {
            if (result.status === 'fulfilled' && result.value) {
              allCombinedItems = allCombinedItems.concat(result.value);
            }
          });

          // Deduplicate by Link
          let uniqueItems = Array.from(new Map(allCombinedItems.map(item => [item.link, item])).values());
          
          // Apply Keyword EXCLUSION Filtering
          const currentExclude = configRef.current.excludeKeywords;
          if (currentExclude) {
             const badWords = currentExclude.toLowerCase().split(',').map(w => w.trim()).filter(Boolean);
             if (badWords.length > 0) {
                 uniqueItems = uniqueItems.filter(item => {
                     const textContent = (item.title + " " + item.description).toLowerCase();
                     return !badWords.some(badWord => textContent.includes(badWord));
                 });
             }
          }
          
          // Apply Source WHITELIST Filtering
          const currentWhitelist = configRef.current.whitelistSources;
          if (currentWhitelist) {
             const goodSources = currentWhitelist.toLowerCase().split(',').map(w => w.trim()).filter(Boolean);
             if (goodSources.length > 0) {
                 uniqueItems = uniqueItems.filter(item => {
                     const itemSource = (item.source || '').toLowerCase();
                     return goodSources.some(goodSource => itemSource.includes(goodSource));
                 });
             }
          }

          // Sort Chronologically (Newest First)
          uniqueItems.sort((a, b) => {
             const timeA = a.time ? new Date(a.time).getTime() : 0;
             const timeB = b.time ? new Date(b.time).getTime() : 0;
             return timeB - timeA; 
          });

          if (uniqueItems.length >= 1) {
            setFeedItems(prevItems => {
               const prevLinks = new Set(prevItems.map(i => i.link));
               const newItems = uniqueItems.filter(i => !prevLinks.has(i.link));
               
               if (!isSilent || prevItems.length === 0) {
                   setCarouselIndex(0); 
               } else if (newItems.length > 0) {
                   setCarouselIndex(0); 
                   
                   // Automatically Read all newly found items (oldest of the new batch first)
                   if (isSilent && configRef.current.autoRead) {
                       const currentRemoveText = configRef.current.removeText;
                       // Reverse newItems so chronologically it reads the oldest new post first, leading up to latest
                       [...newItems].reverse().forEach(item => {
                           let textToRead = item.title;
                           let description = item.description || '';
                           
                           if (currentRemoveText) {
                               const escapeRegExp = (string) => string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                               textToRead = textToRead.replace(new RegExp(escapeRegExp(currentRemoveText), 'gi'), '').trim();
                               description = description.replace(new RegExp(escapeRegExp(currentRemoveText), 'gi'), '').trim();
                           }
                           
                           let combinedRead = "Latest Update: " + textToRead;
                           if (description && description.length > 10) {
                               combinedRead += ". " + description;
                           }
                           
                           // Flag as a Live Update so it interrupts any playing ICYMI loops
                           speakText(combinedRead, { isLiveUpdate: true });
                       });
                   }
               }

               return uniqueItems;
            });
            if (!isSilent) setInfoMsg(`Successfully extracted ${uniqueItems.length} item${uniqueItems.length > 1 ? 's' : ''}.`);
          } else {
            throw new Error("Could not extract items. They may have been blocked by your filters.");
          }
        } catch (err) {
          if (!isSilent) {
            console.error("Scraping error:", err);
            setFeedItems(MOCK_DATA);
            setErrorMsg(`Error: ${err.message}. Showing demo data instead.`);
          }
        } finally {
          if (!isSilent) setIsGenerating(false);
        }
      }, [myBackendUrl, speakText]);

      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        if (params.get('embed') === 'true') {
          setIsEmbedMode(true);
          const urlTheme = params.get('theme') || 'light';
          setConfig({
            layout: params.get('layout') || 'list',
            theme: urlTheme,
            bgColor: params.get('bg') ? decodeURIComponent(params.get('bg')) : (urlTheme === 'dark' ? '#0f172a' : '#ffffff'),
            cardBgColor: params.get('cardBg') ? decodeURIComponent(params.get('cardBg')) : (urlTheme === 'dark' ? '#1e293b' : '#f8fafc'),
            fontFamily: params.get('font') || 'sans',
            accentColor: params.get('color') || '#3b82f6',
            showImages: params.get('imgs') !== 'false',
            showDescription: params.get('desc') !== 'false',
            maxItems: parseInt(params.get('limit')) || 5,
            tickerSpeed: params.get('speed') !== null ? parseInt(params.get('speed')) : 50,
            tickerCharLimit: parseInt(params.get('chars')) || 80,
            removeText: params.get('remove') ? decodeURIComponent(params.get('remove')) : '', 
            excludeKeywords: params.get('exclude') ? decodeURIComponent(params.get('exclude')) : '',
            whitelistSources: params.get('whitelist') ? decodeURIComponent(params.get('whitelist')) : '',
            fallbackImage: params.get('fallbackImg') ? decodeURIComponent(params.get('fallbackImg')) : '',
            refreshRate: parseInt(params.get('refresh')) || 60,
            carouselMode: params.get('carousel') === 'true',
            autoRead: params.get('autoRead') === 'true',
            enableIcymi: params.get('icymi') === 'true',
            icymiTime: parseInt(params.get('icymiTime')) || 3,
            openAIVoice: params.get('openaiVoice') || 'alloy',
            seamless: params.get('seamless') === 'true',
          });

          const targetUrl = params.get('url');
          if (targetUrl && targetUrl !== 'demo') {
            setUrl(decodeURIComponent(targetUrl)); 
            fetchFeedData(decodeURIComponent(targetUrl));
          } else {
            setFeedItems(MOCK_DATA);
          }
        }
      }, [fetchFeedData]);

      // Automatic Background Polling Logic
      useEffect(() => {
        if (!url || url === 'demo' || config.refreshRate < 10) return;
        const intervalId = setInterval(() => {
          fetchFeedData(url, true); // true = run silently in background
        }, config.refreshRate * 1000); 
        return () => clearInterval(intervalId);
      }, [url, config.refreshRate, fetchFeedData]);

      const handleGenerate = (e) => {
        e.preventDefault();
        
        let target = url;
        // Intercept Topic Search and covert to Google News URL
        if (sourceMode === 'topic' && topicQuery) {
            target = `https://news.google.com/rss/search?q=${encodeURIComponent(topicQuery)}`;
            setUrl(target); // Sync state so the embed export utilizes the Google News URL
        }
        
        if (target) fetchFeedData(target, false);
      };

      const handleCopyCode = () => {
        const baseUrl = window.location.href.split('?')[0];
        
        // Define inline styles based on whether Seamless is toggled on or off
        const iframeStyles = config.seamless 
          ? `border: none; background-color: transparent;` 
          : `border-radius: 8px; border: 1px solid ${config.theme === 'dark' ? '#374151' : '#e5e7eb'}; background-color: ${config.bgColor};`;

        const embedCode = `
<!-- RSS Feed Widget -->
<iframe 
  src="${baseUrl}?embed=true&url=${encodeURIComponent(url || 'demo')}&layout=${config.layout}&theme=${config.theme}&font=${encodeURIComponent(config.fontFamily)}&bg=${encodeURIComponent(config.bgColor)}&cardBg=${encodeURIComponent(config.cardBgColor)}&color=${encodeURIComponent(config.accentColor).replace(/%/g, '%25')}&imgs=${config.showImages}&desc=${config.showDescription}&limit=${config.maxItems}&speed=${config.tickerSpeed}&chars=${config.tickerCharLimit}&remove=${encodeURIComponent(config.removeText)}&exclude=${encodeURIComponent(config.excludeKeywords)}&whitelist=${encodeURIComponent(config.whitelistSources)}&fallbackImg=${encodeURIComponent(config.fallbackImage)}&refresh=${config.refreshRate}&carousel=${config.carouselMode}&autoRead=${config.autoRead}&icymi=${config.enableIcymi}&icymiTime=${config.icymiTime}&openaiVoice=${encodeURIComponent(config.openAIVoice)}&seamless=${config.seamless}" 
  width="${exportWidth}" 
  height="${exportHeight}" 
  frameborder="0" 
  style="${iframeStyles}"
  allow="autoplay"
></iframe>
        `.trim();

        const textArea = document.createElement("textarea");
        textArea.value = embedCode;
        document.body.appendChild(textArea);
        textArea.select();
        try {
          document.execCommand('copy');
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        } catch (err) {
          console.error('Failed to copy', err);
        }
        document.body.removeChild(textArea);
      };

      const cleanText = (str) => {
        if (!str || !config.removeText) return str;
        const escapeRegExp = (string) => string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        return str.replace(new RegExp(escapeRegExp(config.removeText), 'gi'), '').trim();
      };

      const timeAgo = (dateString) => {
        if (!dateString) return '';
        const date = new Date(dateString);
        const now = new Date();
        const seconds = Math.round((now - date) / 1000);
        const minutes = Math.round(seconds / 60);
        const hours = Math.round(minutes / 60);
        const days = Math.round(hours / 24);

        if (seconds < 60) return 'Just now';
        if (minutes < 60) return `${minutes} min${minutes > 1 ? 's' : ''} ago`;
        if (hours < 24) return `${hours} hour${hours > 1 ? 's' : ''} ago`;
        return `${days} day${days > 1 ? 's' : ''} ago`;
      };

      const displayItems = feedItems.slice(0, config.maxItems);
      
      const safeItemCount = Math.max(1, displayItems.length);
      const activeCarouselIndex = carouselIndex % safeItemCount;

      const nextSlide = () => setCarouselIndex((prev) => displayItems.length ? (prev + 1) % displayItems.length : 0);
      const prevSlide = () => setCarouselIndex((prev) => displayItems.length ? (prev - 1 + displayItems.length) % displayItems.length : 0);

      const durationMultiplier = (safeItemCount * config.tickerCharLimit) / 400;
      const tickerDuration = (110 - config.tickerSpeed) * durationMultiplier;

      const getGradientStyle = () => {
         return { background: `linear-gradient(to bottom right, ${config.theme === 'dark' ? '#1e293b' : '#f1f5f9'}, ${config.accentColor})` };
      }

      const getWidgetFontFamily = () => {
        return config.fontFamily === 'jetbrains' ? '"JetBrains Mono", monospace' : 'inherit';
      }

      const renderLightbox = () => {
        if (!lightbox) return null;
        
        const iframeUrl = (lightbox.type === 'iframe' && config.theme === 'dark') ? lightbox.url + '&dark=1' : lightbox.url;

        return (
          <div className="fixed inset-0 z-[9999] flex items-center justify-center bg-black/90 p-4 transition-opacity" onClick={() => setLightbox(null)}>
            <button className="absolute top-4 right-4 text-white text-4xl hover:text-gray-300 z-[10000]" onClick={() => setLightbox(null)}>&times;</button>
            <div className="w-full max-w-5xl flex items-center justify-center relative" onClick={(e) => e.stopPropagation()}>
              {lightbox.type === 'video' ? (
                <video src={lightbox.url} referrerPolicy="no-referrer" controls autoPlay loop className="max-w-full max-h-[90vh] object-contain rounded-lg shadow-2xl" />
              ) : lightbox.type === 'iframe' ? (
                <iframe src={iframeUrl} className="w-full h-[80vh] max-w-2xl bg-transparent rounded-lg shadow-2xl border-0" allow="autoplay; fullscreen" allowFullScreen></iframe>
              ) : (
                <img src={lightbox.url} referrerPolicy="no-referrer" className="max-w-full max-h-[90vh] object-contain rounded-lg shadow-2xl" />
              )}
            </div>
          </div>
        );
      };

      if (isEmbedMode) {
        return (
          <div className={`relative w-full h-screen overflow-hidden group ${config.theme === 'dark' ? 'text-slate-100' : 'text-slate-800'}`} style={{ backgroundColor: config.seamless ? 'transparent' : config.bgColor, fontFamily: getWidgetFontFamily() }}>
            <style>{`
              body { background-color: ${config.seamless ? 'transparent' : config.bgColor}; margin: 0; overflow: hidden; }
              @keyframes marquee { 0% { transform: translateX(0%); } 100% { transform: translateX(-100%); } }
              .animate-marquee {
                animation: marquee ${tickerDuration}s linear infinite;
                ${config.tickerSpeed === 0 ? 'animation-play-state: paused !important;' : ''}
              }
              .pause-on-hover:hover .animate-marquee { animation-play-state: paused; }
              ${(config.seamless || config.carouselMode) ? `
              .embed-scroll::-webkit-scrollbar { display: none; width: 0px; }
              .embed-scroll { -ms-overflow-style: none; scrollbar-width: none; }
              ` : `
              .embed-scroll::-webkit-scrollbar { width: 6px; }
              .embed-scroll::-webkit-scrollbar-track { background: transparent; }
              .embed-scroll::-webkit-scrollbar-thumb { background-color: rgba(156, 163, 175, 0.5); border-radius: 20px; }
              `}
            `}</style>

            {/* Mute Button Toggle in Embed */}
            {config.autoRead && (
              <button
                onClick={toggleMute}
                className={`absolute bottom-4 right-4 z-[9999] flex items-center justify-center w-10 h-10 rounded-full shadow-lg backdrop-blur-sm transition-all duration-300 hover:scale-105 opacity-0 pointer-events-none group-hover:opacity-100 group-hover:pointer-events-auto ${isGlobalMuted ? 'bg-red-500/90 text-white' : 'bg-slate-800/80 text-white dark:bg-white/80 dark:text-slate-900'}`}
                title={isGlobalMuted ? "Unmute Voice" : "Mute Voice"}
              >
                <i className={`fa-solid ${isGlobalMuted ? 'fa-volume-xmark' : 'fa-volume-high'}`}></i>
              </button>
            )}

            <div className={`w-full h-full ${config.layout !== 'ticker' ? `embed-scroll overflow-y-auto ${config.seamless ? 'p-0' : 'p-4'}` : 'flex items-center'}`}>
              
              {config.layout === 'list' && (
                <div className="relative w-full group/carousel">
                  <div className="space-y-4 pb-2">
                    {displayItems.map((item, idx) => {
                      if (config.carouselMode && idx !== activeCarouselIndex) return null;
                      const resolvedImage = item.image || config.fallbackImage;
                      const hasMedia = item.video || item.isVideo || resolvedImage;

                      return (
                        <div key={idx} className={`group flex flex-col sm:flex-row ${config.seamless ? 'p-4 gap-4' : 'gap-4 p-4 rounded-xl border'} transition-all duration-200 hover:shadow-md ${config.theme === 'dark' ? 'border-slate-700' : 'border-gray-200'}`} style={{ backgroundColor: config.cardBgColor }}>
                          
                          {config.showImages && hasMedia && (
                            <div className="shrink-0 w-full sm:w-32 h-40 sm:h-24 rounded-lg overflow-hidden bg-gray-200 dark:bg-slate-700 relative">
                              {item.video ? (
                                <div className="w-full h-full relative cursor-pointer group/media overflow-hidden" onClick={(e) => { e.preventDefault(); e.stopPropagation(); setLightbox({type: 'video', url: item.video}); }}>
                                  <AutoPlayVideo src={item.video} poster={resolvedImage} className="w-full h-full object-cover pointer-events-none group-hover:scale-105 transition-transform duration-500" />
                                  <div className="absolute inset-0 flex items-center justify-center bg-black/10 group-hover/media:bg-black/30 transition-colors"><i className="fa-solid fa-play text-white text-2xl drop-shadow opacity-80 group-hover/media:opacity-100 group-hover/media:scale-110 transition-all"></i></div>
                                </div>
                              ) : item.isVideo ? (
                                <div className="w-full h-full relative cursor-pointer group/media overflow-hidden" onClick={(e) => { e.preventDefault(); e.stopPropagation(); setLightbox({type: 'iframe', url: item.embedUrl}); }}>
                                  {resolvedImage && <img src={resolvedImage} referrerPolicy="no-referrer" alt={item.title} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" onError={(e) => e.target.style.display = 'none'} />}
                                  <div className={`absolute inset-0 flex items-center justify-center transition-colors ${resolvedImage ? 'bg-black/20 group-hover/media:bg-black/40' : 'bg-blue-600/20 group-hover/media:bg-blue-600/40'}`}><i className="fa-solid fa-play text-white text-3xl drop-shadow opacity-90 group-hover/media:opacity-100 group-hover/media:scale-110 transition-all"></i></div>
                                </div>
                              ) : (
                                <div className="w-full h-full relative cursor-pointer group/media overflow-hidden" onClick={(e) => { e.preventDefault(); e.stopPropagation(); setLightbox({type: 'image', url: resolvedImage}); }}>
                                  <img src={resolvedImage} referrerPolicy="no-referrer" alt={item.title} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" onError={(e) => e.target.style.display = 'none'} />
                                  <div className="absolute inset-0 flex items-center justify-center bg-black/0 group-hover/media:bg-black/20 transition-colors"><i className="fa-solid fa-expand text-white text-2xl drop-shadow opacity-0 group-hover/media:opacity-100 group-hover/media:scale-110 transition-all"></i></div>
                                </div>
                              )}
                            </div>
                          )}

                          <div className="flex flex-col justify-center flex-1 min-w-0">
                            <a href={item.link} target="_blank" rel="noopener noreferrer" className="block">
                              <h3 className="font-semibold text-base leading-tight mb-1 line-clamp-2 group-hover:underline decoration-2 underline-offset-2" style={{ textDecorationColor: config.accentColor }}>
                                {cleanText(item.title)}
                              </h3>
                              <div className={`flex items-center gap-3 text-[10px] mb-2 font-medium ${config.theme === 'dark' ? 'opacity-70' : 'opacity-60'}`}>
                                {item.source && <span className="flex items-center gap-1"><i className="fa-solid fa-bullhorn"></i>{item.source}</span>}
                                {item.time && <span className="flex items-center gap-1"><i className="fa-regular fa-clock"></i>{timeAgo(item.time)}</span>}
                              </div>
                              {config.showDescription && item.description && (
                                <p className={`text-sm line-clamp-2 ${config.theme === 'dark' ? 'opacity-80' : 'opacity-70'}`}>
                                  {cleanText(item.description)}
                                </p>
                              )}
                            </a>
                          </div>
                        </div>
                      );
                    })}
                  </div>

                  {config.carouselMode && displayItems.length > 1 && (
                    <div className="flex justify-between items-center mt-2 px-2 pb-4 transition-opacity duration-300 opacity-0 pointer-events-none group-hover:opacity-100 group-hover:pointer-events-auto">
                      <button onClick={prevSlide} className={`px-3 py-1.5 rounded-full flex items-center gap-2 transition-colors ${config.theme === 'dark' ? 'bg-slate-800 hover:bg-slate-700 text-white' : 'bg-white hover:bg-gray-100 border border-gray-200 shadow-sm text-gray-700'}`}>
                        <i className="fa-solid fa-chevron-left text-[10px]"></i> Prev
                      </button>
                      <span className={`text-xs font-medium ${config.theme === 'dark' ? 'text-slate-400' : 'text-gray-500'}`}>
                        {activeCarouselIndex + 1} / {displayItems.length}
                      </span>
                      <button onClick={nextSlide} className={`px-3 py-1.5 rounded-full flex items-center gap-2 transition-colors ${config.theme === 'dark' ? 'bg-slate-800 hover:bg-slate-700 text-white' : 'bg-white hover:bg-gray-100 border border-gray-200 shadow-sm text-gray-700'}`}>
                        Next <i className="fa-solid fa-chevron-right text-[10px]"></i>
                      </button>
                    </div>
                  )}
                </div>
              )}

              {/* FEED LAYOUT */}
              {config.layout === 'feed' && (
                <div className={`relative w-full group/carousel ${config.seamless ? 'h-full flex flex-col' : ''}`}>
                  <div className={`${config.seamless ? 'space-y-0 pb-0 flex-1 h-full' : 'space-y-6 pb-2'}`}>
                    {displayItems.map((item, idx) => {
                      if (config.carouselMode && idx !== activeCarouselIndex) return null;
                      const resolvedImage = item.image || config.fallbackImage;
                      const hasMedia = item.video || item.isVideo || resolvedImage;

                      return (
                        <div key={idx} className={`group flex flex-col ${config.seamless ? 'h-full w-full rounded-xl overflow-hidden' : 'gap-4 p-4 rounded-xl border'} transition-all duration-200 hover:shadow-md ${config.theme === 'dark' ? 'border-slate-700' : 'border-gray-200'}`} style={{ backgroundColor: config.cardBgColor }}>
                          
                          {config.showImages && hasMedia && (
                            <div className={`w-full overflow-hidden bg-black/90 relative flex items-center justify-center ${config.seamless ? 'flex-1 min-h-0' : 'rounded-lg'}`}>
                              
                              {/* Cinematic Background Blur */}
                              {resolvedImage && (
                                <div className="absolute inset-0 z-0 overflow-hidden pointer-events-none">
                                  <img src={resolvedImage} className="w-full h-full object-cover filter blur-2xl grayscale opacity-40 scale-125" aria-hidden="true" onError={(e) => e.target.style.display = 'none'} />
                                </div>
                              )}

                              {item.video ? (
                                <div className="w-full h-full relative z-10 cursor-pointer group/media overflow-hidden flex justify-center" onClick={(e) => { e.preventDefault(); e.stopPropagation(); setLightbox({type: 'video', url: item.video}); }}>
                                  <AutoPlayVideo src={item.video} poster={resolvedImage} className={`w-full ${config.seamless ? 'h-full' : 'h-auto max-h-[60vh]'} object-cover pointer-events-none group-hover:scale-[1.02] transition-transform duration-500 mx-auto`} />
                                  <div className="absolute inset-0 flex items-center justify-center bg-black/10 group-hover/media:bg-black/30 transition-colors"><i className="fa-solid fa-play text-white text-4xl drop-shadow opacity-80 group-hover/media:opacity-100 group-hover/media:scale-110 transition-all"></i></div>
                                </div>
                              ) : item.isVideo ? (
                                <div className="w-full h-full relative z-10 cursor-pointer group/media overflow-hidden flex justify-center" onClick={(e) => { e.preventDefault(); e.stopPropagation(); setLightbox({type: 'iframe', url: item.embedUrl}); }}>
                                  {resolvedImage && <img src={resolvedImage} referrerPolicy="no-referrer" alt={item.title} className={`w-full ${config.seamless ? 'h-full' : 'h-auto max-h-[60vh]'} object-cover group-hover:scale-[1.02] transition-transform duration-500 mx-auto`} onError={(e) => e.target.style.display = 'none'} />}
                                  <div className={`absolute inset-0 flex items-center justify-center transition-colors ${resolvedImage ? 'bg-black/20 group-hover/media:bg-black/40' : 'bg-blue-600/20 group-hover/media:bg-blue-600/40'}`}><i className="fa-solid fa-play text-white text-4xl drop-shadow opacity-90 group-hover/media:opacity-100 group-hover/media:scale-110 transition-all"></i></div>
                                </div>
                              ) : (
                                <div className="w-full h-full relative z-10 cursor-pointer group/media overflow-hidden flex justify-center" onClick={(e) => { e.preventDefault(); e.stopPropagation(); setLightbox({type: 'image', url: resolvedImage}); }}>
                                  <img src={resolvedImage} referrerPolicy="no-referrer" alt={item.title} className={`w-full ${config.seamless ? 'h-full' : 'h-auto max-h-[60vh]'} object-cover group-hover:scale-[1.02] transition-transform duration-500 mx-auto`} onError={(e) => e.target.style.display = 'none'} />
                                  <div className="absolute inset-0 flex items-center justify-center bg-black/0 group-hover/media:bg-black/20 transition-colors"><i className="fa-solid fa-expand text-white text-4xl drop-shadow opacity-0 group-hover/media:opacity-100 group-hover/media:scale-110 transition-all"></i></div>
                                </div>
                              )}
                            </div>
                          )}

                          <div className={`flex flex-col justify-center min-w-0 ${config.seamless ? 'p-4 shrink-0' : 'flex-1 px-1'}`}>
                            <a href={item.link} target="_blank" rel="noopener noreferrer" className="block">
                              <h3 className="font-medium text-[15px] sm:text-base leading-snug mb-2 line-clamp-[10] group-hover:underline decoration-2 underline-offset-2 whitespace-pre-wrap" style={{ textDecorationColor: config.accentColor }}>
                                {cleanText(item.title)}
                              </h3>
                              <div className={`flex items-center gap-3 text-[10px] font-medium mt-1 ${config.theme === 'dark' ? 'opacity-70' : 'opacity-60'}`}>
                                {item.source && <span className="flex items-center gap-1"><i className="fa-solid fa-bullhorn"></i>{item.source}</span>}
                                {item.time && <span className="flex items-center gap-1"><i className="fa-regular fa-clock"></i>{timeAgo(item.time)}</span>}
                              </div>
                              {config.showDescription && item.description && (
                                <p className={`text-sm mt-2 line-clamp-3 ${config.theme === 'dark' ? 'opacity-80' : 'opacity-70'}`}>
                                  {cleanText(item.description)}
                                </p>
                              )}
                            </a>
                          </div>
                        </div>
                      );
                    })}
                  </div>

                  {config.carouselMode && displayItems.length > 1 && (
                    <div className={`flex justify-between items-center mt-2 px-2 pb-4 transition-opacity duration-300 opacity-0 pointer-events-none group-hover:opacity-100 group-hover:pointer-events-auto ${config.seamless ? 'absolute bottom-4 left-0 right-0 z-10' : ''}`}>
                      <button onClick={prevSlide} className={`px-3 py-1.5 rounded-full flex items-center gap-2 transition-colors ${config.theme === 'dark' ? 'bg-slate-800/90 hover:bg-slate-700 text-white' : 'bg-white/90 hover:bg-gray-100 border border-gray-200 shadow-sm text-gray-700'}`}>
                        <i className="fa-solid fa-chevron-left text-[10px]"></i> Prev
                      </button>
                      <span className={`text-xs font-medium px-2 py-1 rounded backdrop-blur-sm ${config.theme === 'dark' ? 'text-slate-200 bg-black/30' : 'text-gray-700 bg-white/50'}`}>
                        {activeCarouselIndex + 1} / {displayItems.length}
                      </span>
                      <button onClick={nextSlide} className={`px-3 py-1.5 rounded-full flex items-center gap-2 transition-colors ${config.theme === 'dark' ? 'bg-slate-800/90 hover:bg-slate-700 text-white' : 'bg-white/90 hover:bg-gray-100 border border-gray-200 shadow-sm text-gray-700'}`}>
                        Next <i className="fa-solid fa-chevron-right text-[10px]"></i>
                      </button>
                    </div>
                  )}
                </div>
              )}

              {config.layout === 'grid' && (
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 pb-4 w-full">
                  {displayItems.map((item, idx) => {
                    const resolvedImage = item.image || config.fallbackImage;
                    const hasMedia = item.video || item.isVideo || resolvedImage;

                    return (
                    <div key={idx} className={`group flex flex-col h-full ${config.seamless ? '' : 'rounded-xl border'} overflow-hidden transition-all duration-200 hover:-translate-y-1 hover:shadow-md ${config.theme === 'dark' ? 'border-slate-700' : 'border-gray-200'}`} style={{ backgroundColor: config.cardBgColor }}>
                      {config.showImages && hasMedia ? (
                        <div className="w-full h-32 overflow-hidden bg-gray-200 dark:bg-slate-700 border-b border-inherit relative">
                          {item.video ? (
                            <div className="w-full h-full relative cursor-pointer group/media overflow-hidden" onClick={(e) => { e.preventDefault(); e.stopPropagation(); setLightbox({type: 'video', url: item.video}); }}>
                              <AutoPlayVideo src={item.video} poster={resolvedImage} className="w-full h-full object-cover pointer-events-none group-hover:scale-105 transition-transform duration-500" />
                              <div className="absolute inset-0 flex items-center justify-center bg-black/10 group-hover/media:bg-black/30 transition-colors"><i className="fa-solid fa-play text-white text-3xl drop-shadow opacity-80 group-hover/media:opacity-100 group-hover/media:scale-110 transition-all"></i></div>
                            </div>
                          ) : item.isVideo ? (
                            <div className="w-full h-full relative cursor-pointer group/media overflow-hidden" onClick={(e) => { e.preventDefault(); e.stopPropagation(); setLightbox({type: 'iframe', url: item.embedUrl}); }}>
                              {resolvedImage && <img src={resolvedImage} referrerPolicy="no-referrer" alt={item.title} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" onError={(e) => e.target.style.display = 'none'} />}
                              <div className={`absolute inset-0 flex items-center justify-center transition-colors ${resolvedImage ? 'bg-black/20 group-hover/media:bg-black/40' : 'bg-blue-600/20 group-hover/media:bg-blue-600/40'}`}><i className="fa-solid fa-play text-white text-3xl drop-shadow opacity-90 group-hover/media:opacity-100 group-hover/media:scale-110 transition-all"></i></div>
                            </div>
                          ) : (
                            <div className="w-full h-full relative cursor-pointer group/media overflow-hidden" onClick={(e) => { e.preventDefault(); e.stopPropagation(); setLightbox({type: 'image', url: resolvedImage}); }}>
                              <img src={resolvedImage} referrerPolicy="no-referrer" alt={item.title} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" onError={(e) => e.target.style.display = 'none'} />
                              <div className="absolute inset-0 flex items-center justify-center bg-black/0 group-hover/media:bg-black/20 transition-colors"><i className="fa-solid fa-expand text-white text-3xl drop-shadow opacity-0 group-hover/media:opacity-100 group-hover/media:scale-110 transition-all"></i></div>
                            </div>
                          )}
                        </div>
                      ) : config.showImages && !hasMedia ? (
                         <div className="w-full h-24 opacity-50 border-b border-inherit" style={getGradientStyle()}></div>
                      ) : null}
                      <div className="p-4 flex flex-col flex-1">
                        <a href={item.link} target="_blank" rel="noopener noreferrer" className="block h-full">
                          <h3 className="font-bold text-sm leading-snug mb-1 group-hover:underline decoration-2 underline-offset-2 line-clamp-2" style={{ textDecorationColor: config.accentColor }}>
                            {cleanText(item.title)}
                          </h3>
                          <div className={`flex items-center gap-2 text-[10px] mb-1.5 font-medium ${config.theme === 'dark' ? 'opacity-70' : 'opacity-60'}`}>
                            {item.source && <span className="flex items-center gap-1"><i className="fa-solid fa-bullhorn"></i><span className="truncate max-w-[80px]">{item.source}</span></span>}
                            {item.time && <span className="flex items-center gap-1"><i className="fa-regular fa-clock"></i>{timeAgo(item.time)}</span>}
                          </div>
                          {config.showDescription && item.description && (
                            <p className={`text-xs mt-auto line-clamp-3 ${config.theme === 'dark' ? 'opacity-80' : 'opacity-70'}`}>
                              {cleanText(item.description)}
                            </p>
                          )}
                        </a>
                      </div>
                    </div>
                  )})}
                </div>
              )}

              {config.layout === 'ticker' && (
                <div className="w-full h-full flex items-center overflow-hidden pause-on-hover relative">
                  <div className="absolute left-0 top-0 bottom-0 w-8 z-10" style={{ background: `linear-gradient(to right, ${config.bgColor}, transparent)` }}></div>
                  
                  <div className="flex animate-marquee shrink-0 items-center">
                    {displayItems.concat(displayItems).map((item, idx) => {
                      const cTitle = cleanText(item.title);
                      const tTitle = cTitle.length > config.tickerCharLimit ? cTitle.substring(0, config.tickerCharLimit) + '...' : cTitle;
                      return (
                        <a key={`t1-${idx}`} href={item.link} target="_blank" rel="noopener noreferrer" className="inline-flex items-center px-6 whitespace-nowrap group">
                          <span className="mr-3 text-xl leading-none shrink-0" style={{ color: config.accentColor }}>&bull;</span>
                          {item.source && <span className="mr-2 font-bold text-[11px] uppercase tracking-wider opacity-60">[{item.source}]</span>}
                          <span className="font-medium text-sm hover:underline decoration-2 underline-offset-4" style={{ textDecorationColor: config.accentColor }}>{tTitle}</span>
                          {item.time && <span className={`ml-2 text-[10px] opacity-70 ${config.theme === 'dark' ? 'text-slate-400' : 'text-gray-500'}`}>{timeAgo(item.time)}</span>}
                        </a>
                      );
                    })}
                  </div>
                  <div className="flex animate-marquee shrink-0 items-center" aria-hidden="true">
                    {displayItems.concat(displayItems).map((item, idx) => {
                      const cTitle = cleanText(item.title);
                      const tTitle = cTitle.length > config.tickerCharLimit ? cTitle.substring(0, config.tickerCharLimit) + '...' : cTitle;
                      return (
                        <a key={`t2-${idx}`} href={item.link} target="_blank" rel="noopener noreferrer" className="inline-flex items-center px-6 whitespace-nowrap group">
                          <span className="mr-3 text-xl leading-none shrink-0" style={{ color: config.accentColor }}>&bull;</span>
                          {item.source && <span className="mr-2 font-bold text-[11px] uppercase tracking-wider opacity-60">[{item.source}]</span>}
                          <span className="font-medium text-sm hover:underline decoration-2 underline-offset-4" style={{ textDecorationColor: config.accentColor }}>{tTitle}</span>
                          {item.time && <span className={`ml-2 text-[10px] opacity-70 ${config.theme === 'dark' ? 'text-slate-400' : 'text-gray-500'}`}>{timeAgo(item.time)}</span>}
                        </a>
                      );
                    })}
                  </div>

                  <div className="absolute right-0 top-0 bottom-0 w-8 z-10" style={{ background: `linear-gradient(to left, ${config.bgColor}, transparent)` }}></div>
                </div>
              )}
            </div>
            
            {renderLightbox()}
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-gray-50 text-slate-800 font-sans">
          <style>{`
            @keyframes marquee { 0% { transform: translateX(0%); } 100% { transform: translateX(-100%); } }
            .animate-marquee { animation: marquee ${tickerDuration}s linear infinite; ${config.tickerSpeed === 0 ? 'animation-play-state: paused !important;' : ''} }
            .pause-on-hover:hover .animate-marquee { animation-play-state: paused; }
            .preview-scroll::-webkit-scrollbar { width: 6px; }
            .preview-scroll::-webkit-scrollbar-track { background: transparent; }
            .preview-scroll::-webkit-scrollbar-thumb { background-color: rgba(156, 163, 175, 0.5); border-radius: 20px; }
            ${(config.seamless || config.carouselMode) ? `
            .preview-scroll::-webkit-scrollbar { display: none; width: 0px; }
            .preview-scroll { -ms-overflow-style: none; scrollbar-width: none; }
            ` : ''}
          `}</style>

          <header className="bg-white border-b border-gray-200 sticky top-0 z-10">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
              <div className="flex items-center gap-2">
                <div className="bg-blue-600 p-2 rounded-lg text-white">
                  <i className="fa-solid fa-rss text-lg"></i>
                </div>
                <h1 className="text-xl font-bold tracking-tight text-gray-900">FeedWeaver</h1>
              </div>
              <div className="text-sm text-gray-500 font-medium">URL to Embed Widget</div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
              
              <div className="lg:col-span-4 space-y-6">
                
                <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                  <div className="px-5 py-4 border-b border-gray-100 bg-gray-50/50 flex items-center gap-2">
                    <span className="flex items-center justify-center w-6 h-6 rounded-full bg-blue-100 text-blue-700 text-xs font-bold">1</span>
                    <h2 className="font-semibold text-gray-800">Data Sources</h2>
                  </div>
                  <div className="p-5">
                    
                    {/* NEW: Source Mode Toggle */}
                    <div className="flex bg-gray-100 p-1 rounded-lg mb-4">
                      <button onClick={(e) => { e.preventDefault(); setSourceMode('urls'); }} className={`flex-1 py-1.5 text-sm font-medium rounded-md transition-all ${sourceMode === 'urls' ? 'bg-white text-gray-900 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}>Direct URLs</button>
                      <button onClick={(e) => { e.preventDefault(); setSourceMode('topic'); }} className={`flex-1 py-1.5 text-sm font-medium rounded-md transition-all ${sourceMode === 'topic' ? 'bg-white text-gray-900 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}>Topic Search</button>
                    </div>

                    <form onSubmit={handleGenerate} className="space-y-4">
                      
                      {sourceMode === 'urls' ? (
                        <div>
                          <label className="block text-sm font-medium text-gray-700 mb-1">Target URLs</label>
                          <textarea 
                            placeholder="https://t.me/yourchannel&#10;https://t.me/anotherchannel" 
                            value={url} 
                            onChange={(e) => setUrl(e.target.value)} 
                            className="w-full px-4 py-2 bg-gray-50 border border-gray-300 text-gray-900 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all resize-y min-h-[80px]" 
                            required={sourceMode === 'urls'}
                          />
                          <p className="text-xs text-gray-500 mt-2">Enter multiple URLs (one per line or comma-separated). Posts will be merged chronologically.</p>
                        </div>
                      ) : (
                        <div>
                          <label className="block text-sm font-medium text-gray-700 mb-1">Search Keyword</label>
                          <div className="relative">
                             <i className="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                             <input 
                               type="text" 
                               placeholder="e.g., Artificial Intelligence, Tesla, Space" 
                               value={topicQuery} 
                               onChange={(e) => setTopicQuery(e.target.value)} 
                               className="w-full pl-9 pr-4 py-2 bg-gray-50 border border-gray-300 text-gray-900 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" 
                               required={sourceMode === 'topic'}
                             />
                          </div>
                          <p className="text-xs text-gray-500 mt-2">Automatically streams global news on this topic using Google News.</p>
                        </div>
                      )}

                      <button type="submit" disabled={isGenerating || (sourceMode === 'urls' ? !url : !topicQuery)} className="w-full flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 disabled:bg-blue-300 text-white py-2.5 rounded-lg font-medium transition-colors">
                        {isGenerating ? <><i className="fa-solid fa-rotate fa-spin"></i> Extracting...</> : <><i className="fa-solid fa-rss"></i> Generate Feed</>}
                      </button>
                      
                      {errorMsg && <div className="p-3 bg-amber-50 border border-amber-200 rounded-lg flex items-start gap-2 text-amber-800 text-sm"><i className="fa-solid fa-circle-exclamation mt-0.5"></i><p>{errorMsg}</p></div>}
                      {infoMsg && <div className="p-3 bg-green-50 border border-green-200 rounded-lg flex items-start gap-2 text-green-800 text-sm"><i className="fa-solid fa-circle-check mt-0.5"></i><p>{infoMsg}</p></div>}
                    </form>
                  </div>
                </div>

                <div className={`bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden transition-opacity duration-300 ${feedItems.length === 0 ? 'opacity-50 pointer-events-none' : 'opacity-100'}`}>
                  <div className="px-5 py-4 border-b border-gray-100 bg-gray-50/50 flex items-center gap-2">
                    <span className="flex items-center justify-center w-6 h-6 rounded-full bg-blue-100 text-blue-700 text-xs font-bold">2</span>
                    <h2 className="font-semibold text-gray-800">Customize Widget</h2>
                  </div>
                  
                  <div className="p-5 space-y-6">
                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-2 flex items-center gap-1"><i className="fa-solid fa-border-all"></i> Layout Style</label>
                      <div className="grid grid-cols-4 gap-2">
                        {[{ id: 'list', icon: 'fa-solid fa-list', label: 'List' }, { id: 'grid', icon: 'fa-solid fa-border-all', label: 'Grid' }, { id: 'feed', icon: 'fa-solid fa-image', label: 'Feed' }, { id: 'ticker', icon: 'fa-solid fa-ellipsis', label: 'Ticker' }].map((type) => (
                          <button key={type.id} onClick={() => setConfig({ ...config, layout: type.id })} className={`flex flex-col items-center justify-center gap-1 py-3 px-1 border rounded-lg transition-all ${config.layout === type.id ? 'border-blue-600 bg-blue-50 text-blue-700 shadow-sm' : 'border-gray-200 hover:border-gray-300 text-gray-600 hover:bg-gray-50'}`}>
                            <i className={`${type.icon} text-lg`}></i><span className="text-[11px] font-medium">{type.label}</span>
                          </button>
                        ))}
                      </div>
                    </div>
